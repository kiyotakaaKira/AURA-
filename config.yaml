# AURA Configuration
# All tuneable parameters. Edit this file to customize behavior.
# Restart AURA after making changes.

# ========================================
# TRACKING
# ========================================
tracking:
  camera_index: 0                    # Change if wrong camera opens
  target_fps: 60                     # Target frames per second
  mediapipe_model_complexity: 0      # 0=lite (fast), 1=full, 2=heavy
  min_detection_confidence: 0.7      # Range: 0.5-0.95. Lower = detects more, more false positives
  min_tracking_confidence: 0.5       # Range: 0.3-0.9. Lower = tracks longer, less stable
  face_tracking_enabled: true        # Disable to reduce CPU if no face tracking needed
  attention_gate_enabled: true       # Disable cursor when user not looking at screen

# ========================================
# SMOOTHING
# ========================================
smoothing:
  landmark_prefilter_alpha: 0.6
  algorithm: "one_euro"              # Options: "one_euro" | "kalman" | "ema"
  
  one_euro:
    min_cutoff: 1.0                  # Lower = smoother at rest, more lag. Range: 0.1-5.0
    beta: 0.007                      # Higher = faster response. Range: 0.0-0.5
    d_cutoff: 1.0                    # Derivative smoothing. Usually leave at 1.0
  
  kalman:
    process_noise: 0.01              # How much we trust motion model
    measurement_noise: 0.1           # How much we trust measurements
  
  dead_zone_px: 2.0                  # Pixels below which movement is suppressed
  prediction_blend: 0.3              # Fraction of predicted position blended in

# ========================================
# CURSOR
# ========================================
cursor:
  sensitivity: 1.0                   # Global sensitivity multiplier. Range: 0.3-3.0
  acceleration: true                 # Enable adaptive acceleration
  precision_multiplier: 0.6          # Sensitivity in slow-movement zone
  speed_threshold_low: 2.0           # px/frame below this = precision zone
  speed_threshold_high: 15.0         # px/frame above this = fast zone
  max_acceleration: 2.5              # Maximum acceleration multiplier
  interaction_zone:                  # Area of camera mapped to full screen
    - 0.2   # x_min (left boundary)
    - 0.8   # x_max (right boundary)
    - 0.2   # y_min (top boundary)
    - 0.8   # y_max (bottom boundary)

# ========================================
# GESTURES
# ========================================
gestures:
  activation_hold_ms: 500            # How long to hold open palm for activation
  deactivation_hold_ms: 500          # How long to hold fist for deactivation
  confirmation_frames: 15            # Consecutive frames required to confirm gesture
  confidence_threshold: 0.85         # Minimum classification confidence
  click_pinch_threshold: 0.04        # Normalized pinch distance for click trigger
  drag_hold_ms: 400                  # Hold pinch this long to enter drag mode
  double_click_window_ms: 400        # Max time between clicks for double-click
  auto_sleep_timeout: 3.0            # Seconds without hand before auto-sleep
  attention_pause_timeout: 2.0       # Seconds not looking before soft pause
  swipe_min_speed: 0.08              # Minimum speed for swipe recognition
  activation_cooldown_ms: 500        # Minimum time between deactivate and re-activate

# ========================================
# UI
# ========================================
ui:
  window_width: 900
  window_height: 700
  hud_opacity: 0.92
  show_skeleton: true                # Show hand bone structure
  show_fingertip_dots: true
  show_wrist_ring: true
  show_pinch_line: true
  show_confidence: true
  show_fps: true
  show_interaction_zone: true        # Show subtle zone boundary
  gesture_chip_duration_ms: 2000     # How long gesture name displays

# ========================================
# VOLUME
# ========================================
volume:
  enabled: true
  smoothing_alpha: 0.15              # EMA alpha. Lower = smoother. Range: 0.05-0.5
  min_change_threshold: 0.01         # Ignore changes smaller than this

# ========================================
# RECORDING
# ========================================
recording:
  samples_per_gesture: 10            # How many samples to record per gesture
  frames_per_sample: 30              # How many frames per sample
  countdown_seconds: 3               # Countdown before each capture
  between_sample_pause_ms: 800       # Brief pause between samples

# ========================================
# PERFORMANCE
# ========================================
performance:
  gesture_classification_skip_frames: 2    # Classify every Nth frame (1=every frame)
  context_check_interval_s: 0.5            # How often to check active application
  profile_main_loop: false                 # Enable cProfile output (debug only)

# ========================================
# V3 ADDITIONS
# Stage 0 — normalize raw landmark noise

cursor_kalman:
  process_noise: 0.01                 # Lower = smoother curves
  measurement_noise: 0.1              # Higher = ignores measurements more

idle_detection:
  enabled: true
  speed_threshold: 2.0                # px/frame below which cursor freezes
  entry_delay_ms: 500                 # Must be idle this long before freezing
  wake_threshold: 4.0                 # px/frame to wake from idle
  wake_confirmation_frames: 3

double_clap:
  close_threshold: 0.15               # Normalized palm distance for clap
  reset_threshold: 0.30               # Must separate this far between claps
  window_seconds: 2.0                 # Both claps must occur within this

activation_v3:
  confidence_threshold: 0.80          # Auto-activate above this
  activation_frames: 10               # Consecutive frames required
  sleep_timeout_s: 3.0                # Seconds without hand -> sleep
  sleep_confidence_floor: 0.50        # Below this confidence = no hand

tutorial:
  show_on_first_launch: true          # Auto-show tutorial for new users
  step_timeout_s: 0                   # 0 = no timeout, user controls
  
camera_window:
  default_width: 280
  default_height: 210
  always_on_top: true

